<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/littlechefLibrary.css">
    <title>Alertas</title>
</head>
<body>
    <div>

        <!--Exito-->
        <div class="alert alert-exito">
            <strong>!Platillo servido!</strong> La receta se a guardado en tu recetario correctamente.
        </div>
        <!--Informacion-->
        <div class="alert alert-informacion">
            <strong>Nota del Chef:</strong> Recuerda precaletar el horno antes de meter la masa.
        </div>
        <!--Advertencia-->
        <div class="alert alert-advertencia">
            <strong>¡Cuidado!</strong> Ten quedan pocos ingredientes en el invertario.
        </div>
        <!--Peligro-->
        <div class="alert alert-peligro">
            <strong>Error critico:</strong> Se ha quemado la sopa. Intenta cocinarla de nuevo.
        </div>
       
       
    </div>
</body>
</html>
